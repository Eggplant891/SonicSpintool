name: Build Linux and Windows

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: Linux x64
    runs-on: ubuntu-26.04

    steps:
      - name: Install build dependencies and SDL packages
        shell: bash
        run: |
          sudo apt-get install -y \
            ca-certificates \
            cmake \
            g++ \
            git \
            make \
            ninja-build \
            pkg-config \
            libsdl3-dev \
            libsdl3-image-dev
          cmake --version
          pkg-config --modversion sdl3
          pkg-config --modversion sdl3-image

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: |
          mkdir build
          cd build
          cmake ..
          make
          rm -dR *ake*
          cd ..

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: SonicSpintool-Linux-x64
          path: build
          if-no-files-found: error
          retention-days: 30
