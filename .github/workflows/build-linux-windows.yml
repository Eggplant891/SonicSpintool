name: Build Linux and Windows

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: Linux x64
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install CMake 4.1
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cmake>=4.1,<4.2"
          cmake --version

      - name: Install SDL3 and SDL3_image
        id: sdl
        uses: libsdl-org/setup-sdl@main
        with:
          install-linux-dependencies: true
          version: 3-latest
          version-sdl-image: 3-latest

      - name: Configure
        run: >-
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="${{ steps.sdl.outputs.prefix }}"
          -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/package/SonicSpintool-Linux-x64"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install application files
        run: cmake --install build --config Release

      - name: Bundle SDL shared libraries
        shell: bash
        run: |
          set -euo pipefail
          package="${GITHUB_WORKSPACE}/package/SonicSpintool-Linux-x64"
          mkdir -p "$package/lib"

          find "${{ steps.sdl.outputs.prefix }}" -type f -name '*.so*' \
            -exec cp -L '{}' "$package/lib/" \;

          cat > "$package/run-sonicspintool.sh" <<'SCRIPT'
          #!/usr/bin/env bash
          set -e
          APP_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export LD_LIBRARY_PATH="$APP_DIR/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          cd "$APP_DIR"
          exec ./sonicspintool "$@"
          SCRIPT
          chmod +x "$package/run-sonicspintool.sh"

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: SonicSpintool-Linux-x64
          path: package/SonicSpintool-Linux-x64
          if-no-files-found: error
          retention-days: 30

  windows:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install CMake 4.1
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cmake>=4.1,<4.2"
          cmake --version

      - name: Install SDL3 and SDL3_image
        id: sdl
        uses: libsdl-org/setup-sdl@main
        with:
          version: 3-latest
          version-sdl-image: 3-latest

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -A x64 `
            -DCMAKE_PREFIX_PATH="${{ steps.sdl.outputs.prefix }}" `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/package/SonicSpintool-Windows-x64"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install application files
        run: cmake --install build --config Release

      - name: Bundle SDL DLLs
        shell: pwsh
        run: |
          $package = "${{ github.workspace }}/package/SonicSpintool-Windows-x64"
          $prefix = "${{ steps.sdl.outputs.prefix }}"
          $dlls = Get-ChildItem -Path $prefix -Recurse -File -Filter '*.dll'

          if (-not $dlls) {
            throw "Runtime DLLs were not found under $prefix"
          }

          $dlls | ForEach-Object {
            Copy-Item $_.FullName -Destination $package -Force
          }

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: SonicSpintool-Windows-x64
          path: package/SonicSpintool-Windows-x64
          if-no-files-found: error
          retention-days: 30
