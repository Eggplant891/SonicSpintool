name: Build Linux and Windows

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: Linux x64
    runs-on: ubuntu-26.04

    steps:
      - name: Install build dependencies and SDL packages
        shell: bash
        run: |
          sudo apt-get install -y \
            ca-certificates \
            cmake \
            g++ \
            git \
            make \
            ninja-build \
            pkg-config \
            libsdl3-dev \
            libsdl3-image-dev
          cmake --version
          pkg-config --modversion sdl3
          pkg-config --modversion sdl3-image

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/package/SonicSpintool-Linux-x64"

      - name: Build
        run: cmake --build build --parallel

      - name: Install application files
        run: cmake --install build

      - name: Bundle Linux shared libraries
        shell: bash
        run: |
          set -euo pipefail
          package="${GITHUB_WORKSPACE}/package/SonicSpintool-Linux-x64"
          executable="$package/sonicspintool"
          mkdir -p "$package/lib"

          if [[ ! -x "$executable" ]]; then
            echo "Executable not found at $executable"
            find "$package" -maxdepth 2 -type f -print
            exit 1
          fi

          # Copy the packaged SDL libraries and their non-glibc runtime
          # dependencies from Ubuntu 26.04 instead of rebuilding SDL from source.
          ldd "$executable" | awk '/=> \// { print $3 }' | sort -u | while read -r library; do
            case "$(basename "$library")" in
              libc.so.*|libm.so.*|libpthread.so.*|libdl.so.*|librt.so.*|ld-linux-*.so.*)
                ;;
              *)
                cp -L "$library" "$package/lib/"
                ;;
            esac
          done

          # SDL3_image loads some codec libraries dynamically. Include all
          # direct dependencies of SDL3 and SDL3_image as well.
          for library in /usr/lib/x86_64-linux-gnu/libSDL3.so.* \
                         /usr/lib/x86_64-linux-gnu/libSDL3_image.so.*; do
            [[ -e "$library" ]] || continue
            cp -L "$library" "$package/lib/"
            ldd "$library" | awk '/=> \// { print $3 }' | sort -u | while read -r dependency; do
              case "$(basename "$dependency")" in
                libc.so.*|libm.so.*|libpthread.so.*|libdl.so.*|librt.so.*|ld-linux-*.so.*)
                  ;;
                *)
                  cp -L "$dependency" "$package/lib/"
                  ;;
              esac
            done
          done

          cat > "$package/run-sonicspintool.sh" <<'SCRIPT'
          #!/usr/bin/env bash
          set -e
          APP_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export LD_LIBRARY_PATH="$APP_DIR/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          cd "$APP_DIR"
          exec ./sonicspintool "$@"
          SCRIPT
          chmod +x "$package/run-sonicspintool.sh"

          echo "Bundled libraries:"
          find "$package/lib" -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: SonicSpintool-Linux-x64
          path: package/SonicSpintool-Linux-x64
          if-no-files-found: error
          retention-days: 30

  windows:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install CMake 4.1
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cmake>=4.1,<4.2"
          cmake --version

      - name: Install SDL3 and SDL3_image with vcpkg
        shell: pwsh
        run: |
          $installRoot = "${{ github.workspace }}\vcpkg_installed"
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install `
            sdl3:x64-windows `
            sdl3-image:x64-windows `
            --x-install-root="$installRoot"

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DVCPKG_INSTALLED_DIR="${{ github.workspace }}/vcpkg_installed" `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/package/SonicSpintool-Windows-x64"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install application files
        run: cmake --install build --config Release

      - name: Bundle SDL DLLs
        shell: pwsh
        run: |
          $package = "${{ github.workspace }}/package/SonicSpintool-Windows-x64"
          $runtime = "${{ github.workspace }}/vcpkg_installed/x64-windows/bin"
          $dlls = Get-ChildItem -Path $runtime -File -Filter '*.dll'

          if (-not $dlls) {
            throw "Runtime DLLs were not found under $runtime"
          }

          $dlls | ForEach-Object {
            Copy-Item $_.FullName -Destination $package -Force
          }

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: SonicSpintool-Windows-x64
          path: package/SonicSpintool-Windows-x64
          if-no-files-found: error
          retention-days: 30
