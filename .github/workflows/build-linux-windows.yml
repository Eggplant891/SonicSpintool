name: Build Linux and Windows

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: Linux x64
    runs-on: ubuntu-26.04

    steps:
      - name: Install build dependencies and SDL packages
        shell: bash
        run: |
          sudo apt-get install -y \
            ca-certificates \
            cmake \
            g++ \
            git \
            make \
            ninja-build \
            pkg-config \
            libsdl3-dev \
            libsdl3-image-dev
          cmake --version
          pkg-config --modversion sdl3
          pkg-config --modversion sdl3-image

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: |
          mkdir build
          cd build
          cmake ..
          make
          rm -dR *ake*
          cd ..

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: Spintool-Linux-x64
          path: build
          if-no-files-found: error
          retention-days:  30

  windows-cross:
    name: Windows x64 from Linux
    runs-on: ubuntu-26.04

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        shell: bash
        run: |
          sudo apt-get update

          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            ca-certificates \
            cmake \
            curl \
            file \
            g++-mingw-w64-x86-64 \
            gcc-mingw-w64-x86-64 \
            git \
            ninja-build \
            pkg-config \
            zip

      - name: Display MinGW version
        shell: bash
        run: |
          x86_64-w64-mingw32-gcc --version
          x86_64-w64-mingw32-g++ --version
          cmake --version
          ninja --version

      - name: Clone vcpkg
        shell: bash
        run: |
          rm -rf "$VCPKG_ROOT"

          git clone --depth 1 \
            https://github.com/microsoft/vcpkg.git \
            "$VCPKG_ROOT"

          "$VCPKG_ROOT/bootstrap-vcpkg.sh" \
            -disableMetrics

      - name: Clean Windows build and vcpkg installation
        shell: bash
        run: |
          rm -rf build-windows
          rm -rf "$VCPKG_INSTALLED_DIR"
          rm -rf "$VCPKG_DEFAULT_BINARY_CACHE"

          mkdir -p "$VCPKG_INSTALLED_DIR"
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Install SDL3 for Windows
        shell: bash
        env:
          VCPKG_FEATURE_FLAGS: binarycaching
        run: |
          "$VCPKG_ROOT/vcpkg" install \
            sdl3:x64-mingw-dynamic \
            sdl3-image:x64-mingw-dynamic \
            --x-install-root="$VCPKG_INSTALLED_DIR" \
            --clean-after-build

      - name: Verify Windows SDL files
        shell: bash
        run: |
          set -euo pipefail

          SDL_BIN="$VCPKG_INSTALLED_DIR/x64-mingw-dynamic/bin"
          SDL_LIB="$VCPKG_INSTALLED_DIR/x64-mingw-dynamic/lib"

          echo "SDL DLL files:"
          find "$SDL_BIN" -maxdepth 1 -type f -printf '%f : %s bytes\n' | sort

          echo "SDL import libraries:"
          find "$SDL_LIB" -maxdepth 1 -type f -printf '%f : %s bytes\n' | sort

          test -s "$SDL_BIN/SDL3.dll"
          test -s "$SDL_BIN/SDL3_image.dll"
          test -s "$SDL_LIB/libSDL3.dll.a"
          test -s "$SDL_LIB/libSDL3_image.dll.a"

          file "$SDL_BIN/SDL3.dll"
          file "$SDL_BIN/SDL3_image.dll"
          file "$SDL_LIB/libSDL3.dll.a"
          file "$SDL_LIB/libSDL3_image.dll.a"

      - name: Configure Windows build
        shell: bash
        run: |
          rm -rf build-windows
          cmake -S . -B build-windows \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="${GITHUB_WORKSPACE}/cmake/toolchains/mingw64-linux.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-mingw-dynamic \
            -DVCPKG_HOST_TRIPLET=x64-linux \
            -DVCPKG_INSTALLED_DIR="$VCPKG_INSTALLED_DIR" \
            -DVCPKG_APPLOCAL_DEPS=OFF \
            -DX_VCPKG_APPLOCAL_DEPS_INSTALL=OFF \
            -DCMAKE_FIND_PACKAGE_PREFER_CONFIG=ON

      - name: Build Windows executable
        shell: bash
        run: |
          cmake --build build-windows \
            --parallel \
            --verbose

      - name: Prepare Windows package
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_DIR="${GITHUB_WORKSPACE}/package-windows"
          SDL_BIN="$VCPKG_INSTALLED_DIR/x64-mingw-dynamic/bin"

          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR"

          EXE_PATH="$(find build-windows \
            -type f \
            \( -iname 'spintool.exe' -o -iname 'spintool.exe' \) \
            | head -n 1)"

          if [ -z "$EXE_PATH" ]; then
            echo "spintool.exe not found"
            find build-windows -maxdepth 4 -type f -print
            exit 1
          fi

          cp "$EXE_PATH" "$PACKAGE_DIR/spintool.exe"

          if [ -d metadata ]; then
            cp -a metadata "$PACKAGE_DIR/"
          fi

          if [ -d config ]; then
            cp -a config "$PACKAGE_DIR/"
          fi

          if [ -d redist ]; then
            cp -a redist "$PACKAGE_DIR/"
          fi

          cp -av "$SDL_BIN/"*.dll "$PACKAGE_DIR/"

          for DLL_NAME in \
            libgcc_s_seh-1.dll \
            libstdc++-6.dll \
            libwinpthread-1.dll
          do
            DLL_PATH="$(x86_64-w64-mingw32-g++ \
              -print-file-name="$DLL_NAME")"

            if [ ! -f "$DLL_PATH" ]; then
              echo "Missing MinGW runtime DLL: $DLL_NAME"
              exit 1
            fi

            cp -v "$DLL_PATH" "$PACKAGE_DIR/"
          done

          test -s "$PACKAGE_DIR/spintool.exe"
          test -s "$PACKAGE_DIR/SDL3.dll"
          test -s "$PACKAGE_DIR/SDL3_image.dll"

          echo "Windows package contents:"
          find "$PACKAGE_DIR" -maxdepth 2 -type f -printf '%P : %s bytes\n' | sort

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spintool-Windows-x64
          path: package-windows/
          if-no-files-found: error
          retention-days: 30
